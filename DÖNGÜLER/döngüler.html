<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    
    <script>
        

        //Döngüler

        //Bir işlemi belli bir sayıda veya belli bir şart gerçekleştiği sürece tekrar eden kod yapısına döngü denir.

        //Döngü Tipleri

        //"Sabit Döngüler" for ile oluşturulur.
        //"Şartlı Döngüler" while ya da do-while ile oluşturulur.

        //For döngüsü syntax'ı.

        //for(sayaç;şart;sayaç-artışı) (Tek Komut)
        //komut;

        //for(sayaç:şart;sayaç-artışı) (Çok komut)
        //{
        //komut1;
        //komut2;
        //}



        //For döngüsü örnek 1

        //Ekrana 5 defa yazı yazdıran for döngüsü.

        for(var i=1;i<=5;i++){
            document.write("Merhaba Dünya"+"<br>");
        }


        //For döngüsü örnek 2

        //Sıfırdan n'e kadar olan çift sayıları yaz.

        var n;
        n = Number(prompt("Bir sayı giriniz:"));

        for(var sayac=0;sayac<=n;sayac+2){
            document.write(sayac+"<br>");
        }

        
    </script>
</body>
</html>
