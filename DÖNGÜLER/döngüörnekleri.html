<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>

    <script>
        //N defa yazdırma.

        var s=1,n;

        n = Number(prompt("Bir sayı giriniz"));

        do
        {
            document.write("S="+s+"<br>");
            s++;
        }
        while(s<=n);


        
    </script>
    
</body>
</html>
