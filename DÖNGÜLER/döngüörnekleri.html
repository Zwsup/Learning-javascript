<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>

    <script>
        //Döngüler örnek 1
        //N defa yazdırma.

        var s=1,n;

        n = Number(prompt("Bir sayı giriniz"));

        do
        {
            document.write("S="+s+"<br>");
            s++;
        }
        while(s<=n);


        //Döngüler örnek 2
        //N defa yazdırma.

        var s=1,n;

        n = Number(prompt("Bir sayı giriniz"));

        for(s=1;s<=n;s++){
            document.write("s="+s+"<br>");
        }


        //Döngüler örnek 3
        //N defa yazdırma.

        var s=1,n;

        n = Number(prompt("Bir sayı giriniz"));

        while(s<=5){
            document.write("S="+s+"<br>");
            s++;
        }


        
        //Döngüler örnek 4
        //1'den n'e kadar olan sayıların yazılması.

        var s=1,n;

        n = Number(prompt("Bir sayı giriniz"));

        for(s=1;s<=n;s++){
            document.write(s+"<br>");
        }


        //Döngüler örnek 5
        //1'den n'e kadar olan sayıların yazılması.

        var s=1,n;

        n = Number(prompt("Bir sayı giriniz"));
        while(s<=n){
            document.write(s+"<br>");
            s++;
        }

        //Döngüler örnek 6
        //1'den n'e kadar olan sayıların yazılması.

        var s=1,n;
        n=Number(prompt("Bir sayı giriniz"));
        do
        {
            document.write(s+"<br>");
            s++;
        }
        while(s<=n);


        //Döngüler örnek 7
        //1'den n kadar sayıların toplamı.

        var s=1,n,toplam=0;

        n=Number(prompt("Bir sayı giriniz:"));

        for(s=1;s<=n;s++){
            toplam=toplam+s;
        }
        document.write("Toplam="+toplam);


        //Döngüler örnek 8
        //1'den n kadar sayıların toplamı.

        var s=1,n,toplam=0;

        n = Number(prompt("Bir sayı giriniz"));

        while(s<=n){
            toplam=toplam+s;
            s++;
        }
        document.write("Toplam"+toplam);

        

        //Döngüler örneği 9
        //Ekrandan alınan N adet sayının ortalaması.

        var s,n,toplam=0,ort=0;

        n = Number(prompt("Bir sayı giriniz"));
        for(s=1;s<=n;s++){
            toplam=toplam+s;
        }
        ort=toplam/n;
        document.write("Ortalama="+ort);

        
    </script>
    
</body>
</html>
