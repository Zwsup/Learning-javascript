<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>

    <script>
        //Döngüler örnek 1
        //N defa yazdırma.

        var s=1,n;

        n = Number(prompt("Bir sayı giriniz"));

        do
        {
            document.write("S="+s+"<br>");
            s++;
        }
        while(s<=n);


        //Döngüler örnek 2
        //N defa yazdırma.

        var s=1,n;

        n = Number(prompt("Bir sayı giriniz"));

        for(s=1;s<=n;s++){
            document.write("s="+s+"<br>");
        }


        //Döngüler örnek 3
        //N defa yazdırma.

        var s=1,n;

        n = Number(prompt("Bir sayı giriniz"));

        while(s<=5){
            document.write("S="+s+"<br>");
            s++;
        }
        
    </script>
    
</body>
</html>
