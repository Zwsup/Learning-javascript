        //while döngüsü örnek 1

        var s=1; //sayaç önceden tanımlanmalıdır.
        while(s<=5){
            document.write("merhaba <br>");
            s++; // sayaç komut bloğu içerisinde arttırılmalıdır.
        }

        
    </script>
