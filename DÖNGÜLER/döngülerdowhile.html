<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

<body>

    <script>
        //Do While döngüsü

        //Do while komutunda önce işlem yapılır. Daha sonra şart kontrol edilir. Şart sağlandığı sürece de döngü devam eder.

        //Do while döngüsünde işlem ya da döngü en az bir defa çalışır.

        //Do-while syntax'ı.

        //do
        //{
        //işlemler;
        //}
        //while(şart);


        //Do while döngüsü örnek 1

        var s=1;
        do
        {
            document.write("Merhaba <br>");
            s++;
        }
        while(s<=5);

        
    </script>
    
</body>
