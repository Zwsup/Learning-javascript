<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>

    <script>
        //Eğer oluşturduğumuz döngüdeki şart sürekli sağlanırsa sonsuz yani hiç bitmeyen bir döngü oluşur.

        //Bilgisayar kilitleneblir.

        //Sonsuz bir döngü örneği.

        var x=5;
        var y=10;
        while(x<y){
            document.write("X küçük");
        }

        //Eğer döngüdeki şart hiç sağlanmazsa ölü yani hiç çalışmayan bir döngü oluşur.

        //Ölü döngü örneği

        var x=5, y=10;
        while(x>y){
            document.write("X küçük");
        }


        //Commitlerde hata oluşmuş ilk olarak sonsuz döngü örneği yapıldı sonrasında sonsuz döngü örneği yapıldı.


    </script>
    
</body>
</html>
