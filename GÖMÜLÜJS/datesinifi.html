<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>

    
    <script>
        //Date sınıfının Özellikleri ve Metotları

        //Tarih ve saat ile ilgili işlem yapmak için "Date" nesnesi kullanılır.

        //Javascript dilindeki Date nesnesini kullanara milisaniye, saniye, dakika, saat, gün, ay ve yıl işlemleri yapabiliriz.

        //Javascript ile doğrudan tarih-saat işlemleri yapmak pek kolay değildir. Bazen oldukça karmaşık kodlar yazmamız gerekebilir. Bu nedenle tarih-saat işlemleri için pek çok kütüphane geliştirilmiştir.

        //Bu kütüphanelerden bazıları.

        //Moment.js
        //Date.js
        //XDate


        //Date sınıfının Özellikler ve Metotları.

        //getTime(); 1 Ocak 1970 tarihinden bugüne kadar milisaniye cinsinden geçen zamanı döndürür.

        //örnek

        var tarih = new Date("July 7, 1972 08:30:00");
        alert(tarih.getTime());


        //getDate(); Ayın gününü döndürür (1-31)

        //örnek

        alert(tarih.getDate());

        //7


        //getDay(); haftanın gününü döndürür.(0-6). Haftanın ilk günü Pazar kabul edilir.

        //Örnek

        alert(tarih.getDay());

        //6


        //getMonth(); yılın ayını döndürür (0-11)

        //Örnek

        alert(tarih.getMonth());

        //6


        //getHours(); Günün saatini döndürür (0-23)

        //Örnek

        alert(tarih.getHours());

        //8

        
        //getMinutes(); Saatin dakikasını döndürür (0-59)
        
        //Örnek

        alert(tarih.getMinutes());

        //30


        //getSeconds(); Tarihin saniyesini döndürür (0-59)

        //Örnek

        alert(tarih.getSeconds());

        //0


        //getTimezoneOffset(); Yerel saatin Greenwich'e (GMT)  göre dakika cinsinden farkını döndürür.



        //toLocateString(); Tarihi yerel formatta gösterir.

        //Örnek

        tarih.toLocaleString();


        //setDate() Ayın gününü ayarlar (0-31)

        //Örnek

        tarih.setDate(7);


        //setMonth() Tarihin ayını ayarlar(0-11)

        //Örnek

        tarih.setMonth(6);

        
        //setFullYear() tarihin yılını ayarlar.

        //Örnek

        tarih.setFullYear(1982);


        //setHours() Tarihin saatini ayarlar (0-23)

        //Örnek

        tarih.setHours(8);





        //Örnek

        var tarihh = new Date();
        document.write(tarihh+"<br>");
        document.write(tarihh.toLocaleDateString()+"<br>");


        //Örnek

        //gg.aa.yyyy.ss:dd biçiminde tarih saat yazdırma

        var tarihhh = new Date();
        var gun = tarihhh.getDate();
        var ay = tarihhh.getMonth();
        var yil = tarihhh.getFullYear();
        var saat = tarihhh.getHours();
        var dakika = tarihhh.getMinutes();

        document.write("Tarih:"+gun+"/"+(ay+1)+"/"+yil+"/"+saat+":"+dakika);
    </script>
    
</body>
</html>
