<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>

    <script>
        //Metot/Özellik             Açıklama                                Giriş         Çıkış
        //metin.UpperCase()         büyük harfe çevirir.                    abc           ABC
        //metin.LowerCase()         küçük harfe çevirir.                    ABC           abc
        //metin.length              metin uzunluğu.                         abc           3
        //metin.trim()              sağdaki ve soldaki boşlukları sil.      _abc_         abc
        //metin.bold()              kalınlaştır.                            ince          kalın
        //metin.italic()            italik yap.                             italik        italik
        //metin.charAt(x)           x.karakteri Al/Döndür.
        //metin.concat(x,y,z...)    Metinleri birleştir.
        //metin.replace(x,y)        x yerine y metnini koy.
        //metin.search(x)           belirtilen metni arar ve bulunan pozisyonu döndürür.
        //metin.substring(x,y)      x. ile y. karakterli döndür.
    


        var ad = "Arda";
        document.write(ad.length+"<br>");
        document.write(ad.toUpperCase()+"<br>");
        document.write(ad.toLowerCase()+"<br>");
        document.write(ad.bold()+"<br>");
        document.write(ad.italics()+"<br>");
        document.write(ad.charAt(2)+"<br>");
        document.write(ad.strike()+"<br>");
        document.write(ad.substring(1,3)+"<br>");


        //Örnek 1
        //Length komutu ile dikey bir şekilde isim yazdırma

        var isim = "arda";
        var uzunluk = isim.length;
        for(var i=0; i<uzunluk; i++){
            document.write(isim.charAt(i)+"<br>");
        }


        //Örnek 2
        //kullanıcıdan alınan isimi lenght komutu ile alt alta yazdırma.

        var adam=prompt("isminiz:");
        var uzzunluk=adam.length;
        for(var i=0; i<uzzunluk; i++){
            document.write(adam.charAt(i)+"<br>");
        }
    
    </script>
    
</body>
</html>
