<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>

    <script>
        //Math sınıfının Özellikleri ve Metotları

        //Metot & Özellik       Açıklama                                Giriş             Çıkış
        //Math.sqrt(x)          x'in karekökünü alır.                    4                 2
        //Math.pow(x,y)         x'in y'ninci kuvvetini alır.             x=2,y=3           8
        //Math.abs(x)           x'in Mutlak değeri .                     -5                5
        //Math.min(x,y,z...)    En küçük olan değeri döndürür.           x=2,y=3,z=4       2
        //Math.max(x,y,z...)    En büyük olan değeri döndürür.           x=2,y=3,z=4       4
        //Math.floor(x)         x'i en yakın küçük tamsayıya yuvarlar.   3.7               3
        //Math.ceil(x)          x'i en yakın büyük tamsayıya yuvarlar.   3.7               4
        //Math.round(x)         x'i en yakın tamsayıya yuvarlar.         3.7               4
        //Math.sin(x)           x radyan açısının sinüsünü verir.        
        //Math.cos(x)           x radyan açısının kosinüsünü verir.
        //Math.log(x)           e tabanına göre x'in logaritmasını verir.           
        //Math.random()         0-1 arası rastgele ondalıklı sayı üretir.
        //Math.PI               pi(3.14...) sayısı.
        //Math.E                e(2.718...) sayısı.







        //örnek 1

        document.write("pi="+Math.PI+"<br>");
        document.write("e="+Math.E+"<br>");
        document.write("kök="+Math.sqrt(9)+"<br>");
        document.write("kare="+Math.pow(2,3)+"<br>");
        document.write("küp="+Math.pow(2,3)+"<br>");
        document.write("maks="+Math.max(1,2,3)+"<br>");
        document.write("min="+Math.min(1,2,3)+"<br>");
        document.write("yuvarla="+Math.round(4.6)+"<br>");
        document.write("küçük tamsayıya yuvarla="+Math.floor(4.6)+"<br>");
        document.write("büyük tamsayıya yuvarla="+Math.ceil(4.6)+"<br>");
        document.write("Rastgele="+Math.random()+"<br>");


        //örnek 2
        //daire alan ve çevresini math sınıfı ile bulma

        var r = Number(prompt("Yarıçap:"));
        var alan = Math.PI*Math.pow(r,2);
        var cevre = 2*Math.PI*r;
        document.write("Alan="+alan+"<br>");
        document.write("Çevre="+cevre+"<br>");



    </script>
    
</body>
</html>
