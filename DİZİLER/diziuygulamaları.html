<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>

    <script>
        //Örnek 1

        //Dizinin elemanlarını length metodu ile yazdırma.

        var dizi=[1,2,3,4,5,6];

        var uzunluk = dizi.length;

        for(var i=0; i<uzunluk; i++){
            document.write(dizi[i]+"<br>");
        }


        //uzunluk = dizi.length yerine

        //for(var i=0; i<dizi.length;i++){
        //document.write(dizi[i]+"<br>");
        //}

        //kullanılabilir.




        //Örnek 2
        //Ekrandan alınan Değerlerin dizide saklanması


        var dizii = new Array();
        var n=Number(prompt("Eleman sayısını belirleyiniz(sayı giriniz)"));

        for(var i=0; i<n; i++){
            dizii[i]=Number(prompt(i+" indisli eleman"));
        }
        document.write(dizii)



        //Örnek 3
        //N adet sayının ortalaması

        var diziii = new Array();

        var n=Number(prompt("Eleman sayısını belirleyiniz(sayı giriniz)"));

        for(var i=0; i<n; i++){
            diziii[i]=Number(prompt(i+" indisli eleman"));
        }
        var toplam=0; ort=0;

        for(var i=0; i<n; i++){
            toplam=toplam+diziii[i];
        }

        ort=toplam/n;

        document.write("ortalama="+ort);



        //Örnek 4
        //Sayıların sıralanması


        var sayilar = new Array();

        var n = Number(prompt("Eleman sayısı giriniz(sayı giriniz)"));

        sayilar.sort();
        for(var i=0; i<n; i++){
            document.write(sayilar[i]+"<br>");
        }


        sayilar.reverse();
        for(var i=0; i<n; i++){
            document.write(sayilar[i]+"<br>");
        }



        //örnek 5
        //Dizi sort();

        var sozel=["arda","kemal","girgin"];
        var sayisal=[1,2,3,4,5];

        document.write(sozel+"<br>");
        document.write(sayisal+"<br>");

        document.write(sozel.sort()+"<br>");
        document.write(sayisal.sort()+"<br>");
        document.write(sozel.reverse()+"<br>");
        document.write(sayisal.reverse()+"<br>");

    </script>
    
</body>
</html>
