<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>

    <script>
        //Dizi nedir ?

        //Bellekte art arda yer alan ilişkili değerler kümesine dizi denir.

        //Birden fazla değer barındıran değişkene dizi denir.


        //Eğer "hafta" isimli bir değişken oluşturup bu değişkene haftanın günlerini atamak istersek o zaman "dizi" tanımlarız.


        //Dizi Tanımlama ve Değer Atama

        //Javascript dilinde diziler üç farklı şekilde tanımlanabilir:

        var dizi1=[deger1,deger2,deger3];
        var dizi2 = new Array(5);
        var dizi3 = new Array(deger1,deger2,deger3);



        //Birinci yönteme örnek

        var galatasaray=["osimhen","icardi","yunus","abdülkerim"];

        var parametreler=["yeni",2,"eski",5,"orta"];



        //ikinci yönteme örnek. Dizi tanımlandıktan sonra elemanlar atanır.

        var x = new Array(5);   //5 elemanlı dizi
        x[0]=5;                 //dizinin ilk indeksi 0'dan başlar
        x[1]=22;                //1 indeksli dizi elemanı



        //üçüncü yönteme örnek. Hem dizi tanımlanır hem de değerler(elemanlar) atanır.

        var y = new Array(1,3,5,7,11);
        var cevre = new Array(3.22,5.232,6.1212);


        //Dizi nasıl tanımlanırsa tanımlansın, dizinin eleman sayısı kadar bellek oluşturulur, ve yönteme göre bellekler boş veya dolu olur.



        //Dizi değişken tanımlama kuralları

        //Dizi oluştururken dikkat edilmesi gereken konular:

        //-Dizide farklı türde veriler olabilir; Örneğin bir dizinin içinde "selam",5,true gibi "elemanlar/değerler" olabilir.

        //-Dizi elemanlarının numarası sıfırdan başlar. Dizi elemanlarının numarasına "indeks/indis" denir. Örneğin "asal[2]",ifadesi dizideki "2" numaralı indise sahip elemanı belirtir.

        //indis -->  asal[0] asal[1] asal[2] asal[3] asal[4]

        //eleman -->    1       3       5       7       11





        //Dizi Elemanlarına Değer Atama ve Yazdırma

        //Dizi elemanlarına değer atamak için;

        //dizi[indeks] = değer;

        var hafta = new Array(7);   //hafta dizisi
        hafta[0] = "pazartesi";     //dizinin 0 indeksli elemanı
        hafta[1] = "salı";          //dizinin 1 indeksli elemanı


        //Dizi elemanlarını yazdırmak için [indeks numarası] kullanılır.

        document.write(hafta[0]);   //dizinin 0 indeksli elemanı
        alert(hafta[0]);            //dizinin 1 indeksli elemanı




        //Dizi tanımlama ve dizileri ekrana yazdırma örneği;

        var hafta_gunleri = new Array(7);
        hafta_gunleri[0]="pazartesi";
        hafta_gunleri[1]="salı";
        hafta_gunleri[2]="çarşamba";
        hafta_gunleri[3]="perşembe";
        hafta_gunleri[4]="cuma";
        hafta_gunleri[5]="cumartesi";
        hafta_gunleri[6]="pazar";

        
        document.write(hafta_gunleri); //kısa yol


        document.write("<br>");


        document.write(hafta_gunleri[0]+"<br>");
        document.write(hafta_gunleri[1]+"<br>");
        document.write(hafta_gunleri[2]+"<br>");
        document.write(hafta_gunleri[3]+"<br>");
        document.write(hafta_gunleri[4]+"<br>");
        document.write(hafta_gunleri[5]+"<br>");
        document.write(hafta_gunleri[6]+"<br>");


    </script>
    
</body>
</html>
