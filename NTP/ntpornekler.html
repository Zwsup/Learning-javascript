<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>

    <script>
        //Daire sınıfı ve uygulaması
        //Örnek 1

        class Daire{
            constructor(yaricap){
                this.yaricap = this.yaricap;
            }


            alan(){
                return 3.14*this.yaricap*this.yaricap;
            }


            cevre(){
                return 2*3.14*this.yaricap;
            }
        }


        var r = Number(prompt("Yarıçap giriniz:"));
        var d1 = new Daire(r);
        document.write("Alan="+d1.alan());
        document.write("<br>");
        document.write("Çevre="+d1.cevre());

    </script>
    
</body>
</html>
