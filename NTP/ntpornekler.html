<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>

    <script>
        //Daire sınıfı ve uygulaması
        //Örnek 1

        class Daire{
            constructor(yaricap){
                this.yaricap = this.yaricap;
            }


            alan(){
                return 3.14*this.yaricap*this.yaricap;
            }


            cevre(){
                return 2*3.14*this.yaricap;
            }
        }


        var r = Number(prompt("Yarıçap giriniz:"));
        var d1 = new Daire(r);
        document.write("Alan="+d1.alan());
        document.write("<br>");
        document.write("Çevre="+d1.cevre());










        //Ucgen sınıfı ve uygulaması
        //örnek 2

        class Ucgen{
            static genislik = 0;
            static yukseklik = 0;


            alan(){
                return(this.genislik*this.yukseklik)/2;
            }
        }


        var u1 = new Ucgen();
        u1.genislik = Number(prompt("Genişlik giriniz:"));
        u1.yukseklik = Number(prompt("Yükseklik giriniz"));

        document.write("Üçgenin alanı="+u1.alan());


        






        //Dikdörtgenin genişliğini ve yüksekliğini kullanıcıdan alarak dikdörtgenin alanını ve çevresini bulan sınıf uygulaması.
        //örnek 3


        class Dikdörtgen{
            static genislik=0;
            static yukseklik=0;


            alan(){
                return this.genislik*this.yukseklik;
            }

            cevre(){
                return (this.genislik*this.yukseklik)*2;
            }

            
        }


        var r = new Dikdörtgen();
        r.genislik = Number(prompt("Genişlik giriniz"));
        r.yukseklik = Number(prompt("Yükseklik giriniz"));
        document.write("Dikdörtgenin Alanı="+r.alan());
        document.write("<br>");
        document.write("Dikdörtgenin Çevresi="+r.cevre());
    </script>
    
</body>
</html>
