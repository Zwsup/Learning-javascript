<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>


    <script>
        //Sınıf Oluşturma

        //2015 Yılında yayınlanan "EcmaScript6" sürümüyle javascript'e nesne tabanlı programlama desteği gelmiştir.

        //Daha önceki javascript sürümlerinde nesne tabanlı programlama fonksiyon ve değişkenler kullanılarak (dolayılı olarak) yapılıyordu.

        //Javascript class(sınıf) syntax'ı;

        //class SinifAdi{
        // constructor(){
        // kodlar;
        //}

        

        //Sınıf ve Sınıftan Nesne oluşturma

        //sınıf oluşturma:

        class Uye{                  //Uye adlı sınıf oluşturuluyor.
            constructor(UyeNo){     //Yapıcı fonksiyon sınıfın parametrelerini belirler.
                this.UyeNo = UyeNo; //"this" komutu sınıfı temsil eder, sınıf parametresinde değer atar.
            }
        }


        //sınıftan nesne oluşturma:

        var uye1 = new Uye(1);      //uye1 nesnesi oluşturuldu, no=1 atandı.
        var uye2 = new Uye(2);      //uye2 nesnesi oluşturuldu, no=2 atandı.


        //Üye numaralarını yazdırma:

        document.write("Üye1 no="+uye1.UyeNo);
        document.write("<br>");
        document.write("Üye2 no="+uye2.UyeNo);










        //Yapıcı fonksiyon nedir ?

        //yapıcı fonksiyon nesne içinde tanımlanan özel bir fonksiyondur.

        //özellikler

        //Adı "constructor" olmak zorundadır.

        //Sınıftan yeni bir nesne oluşturulduğunda otomatik olarak çalıştırılır.

        //Nesnenin değişkenlerine(özelliklerine) başlangıç değeri atamak için kullanılır.



        




        //Sınıf Metotlar (Fonksiyonlar)

        //sınıf içinde tanımlanan fonksiyonlara "metot" denir.


        class Daire{
            constructor(yaricap){
                this.yaricap = yaricap;
            }

            alan(){
                return 3.14*this.yaricap*this.yaricap;
            }

            cevre(){
                return 2*3.14*this.yaricap;
            }
        }




        

        //Sınıf özellikleri (Değişkenler)

        //sınıf içinde tanımlanan değişkenlere "özellik" denir.

        class Ucgen{
            static genislik=0;
            static yukseklik=0;


            alan(){
                return(this.genislik*this.yukseklik)/2;
            }
        }


        
    </script>
    
</body>
</html>
