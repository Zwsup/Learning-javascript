        //Number() Kullanımı

        //Ekrandan alınan iki sayının toplamı

        var sayi1=prompt("bir sayı giriniz"); //3

        //Buradaki sorun sözel toplama yapılması, konsoldan veya formdan alınan bütün değerler "String"tir,

        //Böyle bir hata almamak için "Number()" Fonksiyonunu kullanmamız lazım.

        var sayi1=prompt("Bir sayı giriniz");
        var sayi2=prompt("Bir sayı daha giriniz");

        sayi1 = Number(sayi1); //3
        sayi2 = Number(sayi2); //5

        var sonuc = sayi1+sayi2;
        alert(sonuc);
         
        //ÇIKTI
        //8
