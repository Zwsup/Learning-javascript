<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    
    <script>
        //Ad yazdırma uygulaması.

        var ad = prompt("Adınızı Yazınız: ");
        alert("Merhaba "+ad);

        //Girilen sayının karesi
        var sayi=Number(prompt("Bir sayı giriniz: "));
        var kare = sayi*sayi;

        alert("Girdiğiniz sayının karesi: "+kare);


        //İki sayının toplanması

        var sayi1, sayi2, sonuc;

        sayi1 = Number(prompt("Bir sayı giriniz"));
        sayi2 = Number(prompt("Bir sayı daha giriniz"));
        sonuc = sayi1+sayi2;
        alert("Girdiğiniz iki sayının toplamı: "+sonuc);


        //Girilen üç sayının ortalamasını bulan uygulama

        var s1,s2,s3,ortalama;
        s1=Number(prompt("1.sayıyı girin"));
        s2=Number(prompt("2.sayıyı girin"));
        s3=Number(prompt("3.sayıyı girin"));
        ortalama=(s1+s2+s3)/3;
        alert("Girilen 3 sayının ortalaması: "+ortalama);

        //Dikdörtgenin alanını ve çevresini bulan uygulama

        var g, y, alan, cevre;
        g=Number(prompt("Genişlik"));
        y=Number(prompt("Yükseklik"));

        alan = g*y;
        cevre = 2*(g+y);

        alert("Dikdörtgenin alanı: "+alan);
        alert("Dikdörtgenin çevresi: "+cevre);


        //Dairenin alanını ve çevresini bulan uygulama

        var r, alan, cevre, pi=3.14;

        r = Number(prompt("Yarıçap:"));

        alan = pi*r*r;
        cevre = 2*pi*r;
        alert("Dairenin Alanı: "+alan);
        alert("Dairenin Çevresi: "+cevre);

    </script>
</body>
</html>
