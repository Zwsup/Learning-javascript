<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        //Arttırma ve azaltma operatörleri

        //++x önce x'i arttırır, daha sonra x değişkeninin yeni değeri ile kullanılır.
        //x++ önce x değerini kullan, işlemden sonra x değerini 1 arttırır.
        //--x önce x'i azalt, daha sonra x değişkenini yeni değeri ile kullan.
        //x-- önce x değerini kullan, işlemden sonra x değerini 1 azalt.

        
        //*

        var a=2;
        document.write(a++);
        document.write("<br>");
        document.write(a);

        //ÇIKTI
        //2
        //3

        //*
        var a=2;
        document.write(++a);
        document.write("<br>");
        document.write(a);

        //ÇIKTI
        //3
        //3

        //*

        var a=2;
        document.write(a--);
        document.write("<br>");
        document.write(a);

        //ÇIKTI
        //2
        //1

        //*
        var a=2;
        document.write(--a);
        document.write("<br>");
        document.write(a);

        //ÇIKTI
        //1
        //1
    </script>
    
</body>
</html>
