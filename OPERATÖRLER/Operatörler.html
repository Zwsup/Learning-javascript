<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>

    <script>
        //Operatörler matematiksel, mantıksal işlemleri yapmaya yarar.

        var a = Number(prompt("a:"));
        var b = Number(prompt("b:"));

        var topla = a+b; // Toplama
        var cikar = a-b; // Çıkarma
        var carpma = a*b; // Çarpma
        var bölme = a/b; // Bölme
        var modd = a%b; //Mod alma

        document.write("Toplama: "+topla+"<br>");
        document.write("Çıkarma: "+cikar+"<br>");
        document.write("Çarpma: "+carpma+"<br>");
        document.write("Bölme: "+bölme+"<br>");
        document.write("Mod: "+modd+"<br>");

        
    </script>
    
</body>
</html>
