<body>
    <script>
        //ATAMA OPERATÖRLERİ

        //Atama operatörleri, atama işlemini yapmak ve atama işlemini kolaylaştırmak için kullanılan operatörlerdir,örneğin x+=1 gibi bir operatör kullanılabilir.

        // =  x=y  Atama
        // += x+=y x=x+y
        // -= x-=y x=x-y
        // *= x*=y x=x*y
        // /= x/=y x=x/y
        // %= x%=y x=x%y


        //uygulama


        var a,b,c = 1;

        a=5; //Atama işlemi
        b=Number(prompt("b:"));
        a+=1; //a=a+1
        b-=1; //b=b-1
        c*=a; //c=c*a

        document.write("a="+a+"b="+b+"c="+c);

        //ÇIKTI
        //A=6
        //B=5
        //C=5
    </script>
