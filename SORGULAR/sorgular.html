        //if else örnek1
        
        //Ekrandan alnan ziyaretçinin yaşı 18'den küçükse sayfaya "yaşınız küçük", değilse yaşınız uygun yazdırsın"

        var yas;
        yas = Number(prompt("Yaşınız: "));

        if(yas<18){
            document.write("yaşınız 18'den küçük");
        }
        else{
            document.write("yaşınız 18'den büyük");
        }

        //if else örnek 2

        //kullanıcıdan alınan yaş 18'den küçükse veli onayı gerekmektedir yazan değilse iyi eğlenceler yazan program.

        var yas;
        yas=Number(prompt("yaşınız: "));
        if(yas<18){
            document.write("yaşınız 18'den küçük");
            document.write("<br>");
            document.write("veli onayı gerekmektedir");
        }
        else{
            document.write("Yaşınız 18'den büyük");
            document.write("<br>");
            document.write("iyi eğlenceler");
        }
        
        //if else örnek 3

        // vize ve final notunun ortalamasını alan 50'den küçükse kaldı değilse geçti yazan program.

        var vize,final,ortalama;
        vize=Number(prompt("Vize notunuz:"));
        final=Number(prompt("Final notunuz: "));
        ortalama=(vize+final)/2;

        if(ortalama<50){
            document.write("Kaldınız");
        }
        else{
            document.write("Geçtiniz");
        }

        //else if örnek

        //Öğrencinin aldığı 0-100 arası nota göre başarı durumu tespit edilsin.

        var not1,not2,not3,ortalama;

        not1=Number(prompt("1.Notunuz: "));
        not2=Number(prompt("2.Notunuz: "));
        not3=Number(prompt("3.Notunuz: "));

        ortalama=(not1+not2+not3)/3;

        if(ortalama<50){
            alert("kaldınız");
        }
        else if(ortalama<=65){
            alert("orta");
        }
        else if(ortalama<=80){

        //else if örnek 2

        //Kullanıcıdan alınan yaşa göre kullanıcının bebek, çocuk, genç, yetişkin yada yaşlı olup olunmadığı bulunsun.

        var yas;
        yas = Number(prompt("Yaşınız ?: "));

        if(yas<2){
            alert("bebek");
        }
        else if(yas<12){
            alert("çocuk");
        }
        else if(yas<42){
            alert("genç");
        }
        else if(yas<62){
            alert("yetişkin");
        }
        else{
            alert("yaşlı");
        }
