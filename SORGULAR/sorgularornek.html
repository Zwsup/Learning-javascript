<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>

    <script>
        //Örnek 1
        //Sadece pozitif sayıların karesini alan program.

        var sayi,kare;
        sayi=Number(prompt("sayı giriniz"));
        if(sayi<0){
            alert("sayı negatif");
            alert("sayfayı yenileyin");
        }
        else {
            kare = sayi*sayi;
            alert("Girdiğiniz sayının karesi="+kare);
        }


        //Örnek 2
        //Dairenin alanı ve çevresi

        var r,alan,cevre;
        var pi=3.14;

        r = Number(prompt("Yarıçap giriniz"));
        
        if(r<0){
            alert("yarıçap negatif!");
            alert("sayfayı yenileyin");
        }
        else{
            alan = pi*r*r;
            cevre= 2*pi*r;
            alert("Alan="+alan+"<br>"+"Çevre="+cevre);
        }


        //Örnek 3
        //Girilen iki sayıdan büyük olanı bulan program

        var sayi1,sayi2;
        sayi1=Number(prompt("Bir sayı giriniz"));
        sayi2=Number(prompt("Bİr sayı daha giriniz"));

        if(sayi1>sayi2){
            alert("ilk girdiğiniz sayı daha büyük");
        }
        else {
            alert("ikinci girdiğiniz sayı daha büyük");
        }



        //Örnek 4
        //Girilen iki sayının durumu

        var sayi1,sayi2;
        sayi1=Number(prompt("Bir sayı giriniz"));
        sayi2=Number(prompt("Bir sayı daha giriniz"));

        if(sayi1==sayi2){
            alert("Girdiğiniz sayılar birbirine eşit");
        }
        else if(sayi1>sayi2){
            alert("İlk girdiğiniz sayı daha büyük");
        }
        else{
            alert("İkinci girdiğiniz sayı daha büyük");
        }



        //Örnek 5
        //Geçti kaldı programı

        var not1,not2,ortalama;

        not1=Number(prompt("İlk notunuzu giriniz"));
        not2=Number(prompt("İkinci notunuzu giriniz"));
        ortalama=(not1+not2)/2;

        if(ortalama<50){
            alert("kaldınız");
        }
        else {
            alert("Geçtiniz");
        }

        
    </script>
    
</body>
</html>
