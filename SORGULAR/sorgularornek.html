<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>

    <script>
        //Örnek 1
        //Sadece pozitif sayıların karesini alan program.

        var sayi,kare;
        sayi=Number(prompt("sayı giriniz"));
        if(sayi<0){
            alert("sayı negatif");
            alert("sayfayı yenileyin");
        }
        else {
            kare = sayi*sayi;
            alert("Girdiğiniz sayının karesi="+kare);
        }


        //Örnek 2
        //Dairenin alanı ve çevresi

        var r,alan,cevre;
        var pi=3.14;

        r = Number(prompt("Yarıçap giriniz"));
        
        if(r<0){
            alert("yarıçap negatif!");
            alert("sayfayı yenileyin");
        }
        else{
            alan = pi*r*r;
            cevre= 2*pi*r;
            alert("Alan="+alan+"<br>"+"Çevre="+cevre);
        }
    </script>
    
</body>
</html>
