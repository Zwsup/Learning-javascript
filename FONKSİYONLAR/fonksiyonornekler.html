<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>

    <script>
        // Yazdırma Fonksiyonu
        //Örnek 1

        function yaz(deger){
            document.write(deger+"<br>");
        }

        yaz("arda");
        yaz(2222);
        var ad = "arda";
        yaz(ad);
        var yas = 22;
        yaz(yas);


        //N defa merhaba yazdırma
        //Örnek 2

        function merhaba(){
            document.write("merhaba <br>");
        }

        var s,n;

        n = Number(prompt("Bir sayı giriniz"));
        for(s=0;s<=n;s++)
        {
            merhaba();
        }

    </script>
    
</body>
</html>
