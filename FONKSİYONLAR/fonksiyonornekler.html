<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>

    <script>
        // Yazdırma Fonksiyonu
        //Örnek 1

        function yaz(deger){
            document.write(deger+"<br>");
        }

        yaz("arda");
        yaz(2222);
        var ad = "arda";
        yaz(ad);
        var yas = 22;
        yaz(yas);


        //N defa merhaba yazdırma
        //Örnek 2

        function merhaba(){
            document.write("merhaba <br>");
        }

        var s,n;

        n = Number(prompt("Bir sayı giriniz"));
        for(s=0;s<=n;s++)
        {
            merhaba();
        }
        



        //Kare fonksiyonu
        //Örnek 3

        function kare(sayi){
            var karesi = sayi*sayi;
            return karesi;
        }

        var x;
        x= Number(prompt("Bir sayı giriniz"));
        document.write("Girdiğiniz sayının karesi="+kare(x));




        //Toplama fonksiyonu
        //Örnek 4

        function topla(x,y)
        {
            var toplam=x+y;
            return toplam;
        }

        var a,b;

        a=Number(prompt("Bir sayı giriniz"));
        b=Number(prompt("Bir sayı daha giriniz"));

        document.write("Girdiğiniz sayıların toplamı="+topla(a,b));

    </script>
    
</body>
</html>
