<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <script>
        //DOM (Document Object Model) Nedir ?

        //DOM, bize tarayıcı ve HTML komutları arasındaki ilişki ve hiyerarşi konusunda bilgi veren modeldir.

        //Bu model sayesinde HTML sayfasındaki nesneler/komutlar seçilip işlem yapılabilir.

        //DOM'da her HTML komutu bir nesne olarak davranır. Bu özelliklerden faydanalaranak HTML komutlarında aşağıdaki işlemler yapılabilir;

        //-Sayfayas HTML komutlarının eklenmesi veya silinmesi.
        //-HTML komutlarının içeriklerinin değiştirilmesi.
        //-HTML komutlarının özelliklerinin değiştirilmesi.
        //-CSS Kodlarının değişitirilmesi.
        //-HTML olaylarının tetiklenmesi.


        // Document Nesnesi;

        // Document nesnesi tarayıcıdaki HTML sayfasını temsil eder.

        // Document nesnesini kullanarak sayfadaki resim veya form elemanı (buton, metin kutusu, onay kutusu) gibi tüm nesnelere erişebiliriz.

        // Bu nedenle "document" nesnesi en çok kullanılan Javascript nesnelerinden biridir.

        // Document Nesnesinin Özellik ve Metotları

        // Özellik/Metot                            Açıklama
        //
        //document.write()                       sayfaya yaz.
        //document.writeln()                     sayfaya yaz ve alt satıra git.
        //document.getElementById(id)            Id numarasını kullanarak nesneyi seç.
        //document.getElementByName(name)        Elemanın name özelliğini kullanarak seç.
        //document.getElementsByTagName(tag)     Tag kullanarak seç.
        //document.URL                           Aktif sayfanın adresi.
        //document.referrer                      Aktif sayfaya hangi adresten gelindiğini döndürür.
        //document.title                         Sayfa başlığı.
        //document.width                         Sayfa genişliği.
        //document.height                        Sayfa yüksekliği.
        //document.characterSet                  HTML Sayfasının karakter seti. UTF-8 veya Windows-1254.
        //document.domain                        Alan adını döndürür.
        //document.forms[]                       Sayfadaki form elemanlarına ulaşmamızı sağlayan dizi.

        //document.lastModified                  Sayfanın son güncellenme tarihi.
        
        


        //Sıklıkla Kullanılanlar


        document.write("sayfa adresi="+document.URL);
        document.write("<br>");
        document.write("gelinen sayfa="+document.referrer);
        document.write("<br>");
        document.write("Sayfanın Title'ı="+document.title);
        document.write("<br>");
        document.write("sayfa genişliği="+document.documentElement.clientWidth);
        document.write("<br>");
        document.write("sayfa yüksekliği="+document.documentElement.clientHeight);
        document.write("<br>");
        document.write("karakter seti="+document.characterSet);
        document.write("<br>");
        document.write("son güncellenme tarihi="+document.lastModified);







        //JS ile HTML Komutlarının Seçimi

        //HTML komutlarının seçimi için aşağıdaki yöntemler kullanılabilir.

        //-document.getElementById(id)              ID Özelliği ile seçilir.
        //-document.getElementByTagName(name)       Tag adına göre seçilir.
        //-document.getElementByClassName(name)     Class adına göre seçilir.



        //Örnek

        //Tüm p taglarını / komutlarını bul seç;
        document.getElementsByName("p");

        //Önce Id değeri "main" olan elemanı seç, daha sonra da onun içindeki p taglarını seç.
        var x = document.getElementById("main");
        var y = x.getElementsByTagName("p");


        //Sınıf / Class adlı "intro" olan komutu seç ve x değişkenine ata
        var x = document.getElementsByClassName("intro");


        //CSS Seçici ile komut seçmek için kullanılır. Class özelliği "intro" olan paragrafları seç.
        var x = document.querySelectorAll("p.intro");
