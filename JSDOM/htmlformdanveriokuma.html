<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>

    <script>
        //HTML Formdan Veri Okuma

        //Web sayfalarının en önemli özelliği ziyaretçilerden veri alabilmesi ve bu verilere göre anında işlem yapabilmesidir. Bu sayede ziyaretçilerle etkileşim kurabilmekte, e-ticaret ve sosyal medya gibi uygulamalar geliştiribilmektedir.

        //HTML Formlarındaki veriyi almak için "document.getElementById("eleman").value" komutu kullanılır.

        //Bu komut web sayfası (document) içindeki bir kimliğe (ID) sahip HTML form elemanını (Element) seçip değerini (value) alır.

        

        //Örnek 1
        //HTML Formundan veri okumak
        function yazi(){
            var ad = document.getElementById("ad").value;
            alert("Adınız="+ad);
        }


        //Örnek 2
        //Formdan alınan sayının karesi
        function kare(){
            var sayi, kare;

            sayi = document.getElementById("sayi").value;
            kare = sayi * sayi
            document.getElementById("text").innerHTML="Girdiğiniz sayı="+sayi;
            document.getElementById("text2").innerHTML="Girdiğiniz sayının karesi="+kare;
        }


        //Örnek 3
        //Formdan alınan iki sayının toplamı
        function topla(){
            var sayi1,sayi2,toplam;

            sayi1=Number(document.getElementById("sayi1").value);
            sayi2=Number(document.getElementById("sayi2").value);
            toplam=sayi1+sayi2;
            document.getElementById("sonuc").innerHTML="Girdiğiniz iki sayının toplamı="+toplam;

        }


        //Örnek 4
        //Formdan alınan sayının karesi ama kontrol yapılarak
        function hesapla(){
            var sayi, kare;
            sayi = Number(document.getElementById("karesayi").value);
            

            if(sayi==""){
                alert("Lütfen bir sayı giriniz");
            }
            else if(sayi <=0){
                alert("Lütfen pozitif bir sayı giriniz");
            }
            else if(sayi >=100){
                alert("Lütfen 100'den küçük bir sayı giriniz");
            }
            else{
                kare = sayi*sayi;
                document.getElementById("karesonuc").innerHTML="Girdiğiniz sayının karesi="+kare;
            }
        }


        //Örnek 5
        //Girilen sayının karesi Çok kontrollü

        function hessapla(){
            var sayi, kare;
            sayi = Number(document.getElementById("sayikare").value);
            kare = sayi*sayi;


            if(sayi==""){
                alert("Lütfen bir sayı giriniz");
                document.getElementById("sayikare").style.backgroundColor="red";
                document.getElementById("sayikare").focus();
            }
            else if(sayi <=0){
                alert("Lütfen pozitif bir sayı giriniz");
                document.getElementById("sayikare").style.backgroundColor="red";
                document.getElementById("sayikare").focus();
            }
            else if(sayi >=100){
                alert("Lütfen 100'den küçük bir sayı giriniz");
                document.getElementById("sayikare").style.backgroundColor="red";
                document.getElementById("sayikare").focus();
            }
            else{
                kare = sayi*sayi;
                document.getElementById("sonucal").innerHTML="Girdiğiniz sayının karesi="+kare;
                document.getElementById("sayikare").style.backgroundColor="yellow";
            }
        }

        //örnek 6
        //ID değeri "ad" olan metin kutusunun içeriği boş ise "lütfen adınızı giriniz" yazan mesaj kutusu

        function isim(){
            var isim;
            isim = document.getElementById("add").value;

            if(isim ==""){
                alert("Lütfen isiminizi giriniz");
            }
            else{
                document.getElementById("issim").innerHTML="İsminiz="+isim;
            }
        }

        //örnek 7
        //Id değeri "vize1" olan metin kutusunun değeri sıfırdan küçük veya 100'den büyükse "lütfen geçerli bir değer giriniz" yazan mesaj kutusu

        function vizehesapla(){
            var vize;
            vize = Number(document.getElementById("vize1").value);
            
            if(vize <=0){
                alert("Lütfen pozitif bir sayı giriniz");
            }
            else if(vize >=100){
                alert("Lütfen 100'den küçük bir sayı giriniz");
            }
            else{
                document.getElementById("vizesonuc").innerHTML="Notunuz="+vize;
            }
        }

    </script>

    <!-- örnek 1 -->
    <form>
    Ad <input type="text" id="ad"> <br>
    <input type="button" value="OK" onclick="yazi()">
    </form>
    <br>
    <br>

    <!-- örnek 2 -->
     <form>
        Sayı <input type="number" id="sayi"> <br>
        <input type="button" value="gönder" onclick="kare()">
     </form>

     <div id="text"></div>
     <div id="text2"></div>


     <br>
     <br>

    <!-- örnek 3 -->
     <form>
        1.Sayı <input type="number" id="sayi1"> <br>
        2.Sayı <input type="number" id="sayi2"> <br>
        <input type="button" value="Topla" onclick="topla()">
     </form>

     <div id="sonuc"></div>

     <br>
     <br>
     <!-- örnek 4 -->
      <form>
        Sayı <input type="text" id="karesayi"> <br>
        <input type="button" value="Hesapla"  onclick="hesapla()">
      </form>
      <div id="karesonuc"></div>


      <!-- örnek 5 -->
       <br>
       <br>

      <form>
        Sayı <input type="text" id="sayikare"> <br>
        <input type="button" value="Hesaplarmısın" onclick="hessapla()">
      </form>
      <div id="sonucal"></div>

      <br>
      <br>

      <!-- örnek 6 -->
       <form>
        İsim <input type="text" id="add"> <br>
        <input type="button" value="Gönder" onclick="isim()">
       </form>
       <div id="issim"></div>

       <br>
       <br>

       <!-- örnek 7 -->

       <form>
        Vize <input type="text" id="vize1">
        <input type="button" value="gönder" onclick="vizehesapla()">
       </form>
       <div id="vizesonuc"></div>
</body>
</html>
